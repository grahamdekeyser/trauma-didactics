<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Helvetica, Arial, sans-serif" shape-rendering="geometricPrecision">
  <style>
    .title { font-size: 22px; font-weight: 700; fill: #111; }
    .subtitle { font-size: 13px; font-weight: 400; fill: #555; font-style: italic; }
    .app-header { font-size: 15px; font-weight: 700; fill: #111; }
    .access-note { font-size: 11px; font-weight: 400; fill: #666; letter-spacing: 0.08em; }
    .card-title { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
    .card-sub { font-size: 10px; font-weight: 400; fill: #777; }
    .row-date { font-size: 10px; font-weight: 600; fill: #555; font-family: ui-monospace, Menlo, Consolas, monospace; }
    .row-type-bc { font-size: 9px; font-weight: 700; fill: #92400e; letter-spacing: 0.1em; }
    .row-type-fc { font-size: 9px; font-weight: 700; fill: #0369a1; letter-spacing: 0.1em; }
    .row-type-an { font-size: 9px; font-weight: 700; fill: #047857; letter-spacing: 0.1em; }
    .row-topic { font-size: 11px; font-weight: 500; fill: #222; }
    .row-paper { font-size: 10px; font-weight: 400; fill: #666; font-style: italic; }
    .week-label { font-size: 9px; font-weight: 600; fill: #888; letter-spacing: 0.1em; }
    .list-item { font-size: 11px; font-weight: 400; fill: #333; }
    .list-item-meta { font-size: 9px; font-weight: 400; fill: #888; }
    .callout-num { font-size: 11px; font-weight: 700; fill: #fff; }
    .callout-text { font-size: 12px; font-weight: 500; fill: #1f4e79; }
    .callout-text-bold { font-size: 12px; font-weight: 700; fill: #1f4e79; }
    .card { fill: #fff; stroke: #d6d6d6; stroke-width: 1; }
    .card-header-rule { stroke: #e5e5e5; stroke-width: 1; }
    .row-rule { stroke: #ececec; stroke-width: 1; }
    .border-bc { stroke: #f59e0b; stroke-width: 3; }
    .border-fc { stroke: #0ea5e9; stroke-width: 3; }
    .border-an { stroke: #10b981; stroke-width: 3; }
    .chrome { fill: #fafafa; stroke: #d6d6d6; stroke-width: 1; }
    .chrome-line { stroke: #d6d6d6; stroke-width: 1; }
    .leader { stroke: #1f4e79; stroke-width: 1.25; fill: none; }
    .callout-dot { fill: #1f4e79; }
    .vote-pill { fill: #f3f4f6; stroke: #d1d5db; stroke-width: 0.75; }
    .vote-text { font-size: 9px; font-weight: 600; fill: #444; }
  </style>

  <!-- Title -->
  <text x="600" y="34" text-anchor="middle" class="title">OHSU Orthopaedic Trauma Didactics: home page</text>
  <text x="600" y="54" text-anchor="middle" class="subtitle">annotated layout of the single-page dashboard</text>

  <!-- ===== App chrome (browser frame) ===== -->
  <rect x="80" y="80" width="1040" height="760" rx="6" class="chrome"/>
  <line x1="80" y1="112" x2="1120" y2="112" class="chrome-line"/>
  <circle cx="100" cy="96" r="4" fill="#ef4444"/>
  <circle cx="116" cy="96" r="4" fill="#f59e0b"/>
  <circle cx="132" cy="96" r="4" fill="#10b981"/>
  <rect x="160" y="88" width="700" height="16" rx="3" fill="#fff" stroke="#d6d6d6" stroke-width="1"/>
  <text x="172" y="100" font-size="10" fill="#888">https://trauma-didactics.vercel.app</text>

  <!-- App header (site header) -->
