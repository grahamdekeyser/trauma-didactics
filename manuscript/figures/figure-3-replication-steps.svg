<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1380" font-family="Helvetica, Arial, sans-serif" shape-rendering="geometricPrecision">
  <style>
    .fig-title { font-size: 28px; font-weight: 700; fill: #111; }
    .fig-subtitle { font-size: 17px; font-weight: 400; fill: #555; font-style: italic; }
    .col-hdr { font-size: 13px; font-weight: 700; fill: #888; letter-spacing: 1.5px; }
    .phase-label { font-size: 15px; font-weight: 700; fill: #ffffff; letter-spacing: 1.8px; }
    .row-title { font-size: 22px; font-weight: 700; fill: #111; }
    .row-body { font-size: 17px; font-weight: 400; fill: #333; }
    .row-mono { font-family: "Menlo", "Consolas", monospace; font-size: 15px; font-weight: 400; fill: #1f4e79; }
    .step-num { font-size: 22px; font-weight: 700; fill: #1f4e79; }
    .tool-name { font-size: 16px; font-weight: 600; fill: #222; letter-spacing: 0.1px; }
    .phase-band { fill: #1f4e79; }
    .row-alt { fill: #fafafa; }
    .row-white { fill: #ffffff; }
    .divider { stroke: #e4e4e4; stroke-width: 1; }
    .outer { fill: none; stroke: #d4d4d4; stroke-width: 1.2; }
    .step-circle { fill: #ffffff; stroke: #1f4e79; stroke-width: 2; }
  </style>

  <defs>
    <!-- VS Code: blue folded-ribbon mark -->
    <symbol id="i-vscode" viewBox="0 0 24 24">
      <path d="M23.15 2.587L18.21.21a1.494 1.494 0 0 0-1.705.29l-9.46 8.63-4.12-3.128a.999.999 0 0 0-1.276.057L.327 7.261A1 1 0 0 0 .326 8.74L3.898 12 .326 15.26a1 1 0 0 0 .001 1.479L1.65 17.94a.999.999 0 0 0 1.276.057l4.12-3.128 9.46 8.63a1.492 1.492 0 0 0 1.704.29l4.942-2.377A1.5 1.5 0 0 0 24 20.06V3.939a1.5 1.5 0 0 0-.85-1.352zM17 17.44L10.8 12 17 6.56v10.88z" fill="#0098D4"/>
    </symbol>

    <!-- Claude: terracotta 8-point burst (Anthropic mark) -->
    <symbol id="i-claude" viewBox="0 0 24 24">
      <path d="M12 1 L13.4 8.7 L19.9 5.4 L16.8 12 L22.8 13.2 L16.8 15 L19.2 21.2 L13.4 16.7 L12 23 L10.6 16.7 L4.8 21.2 L7.2 15 L1.2 13.2 L7.2 12 L4.1 5.4 L10.6 8.7 Z" fill="#D97757"/>
    </symbol>

    <!-- Node.js: green hexagon with "N" -->
    <symbol id="i-node" viewBox="0 0 24 24">
      <path d="M12 1.25 L21.75 7 V17 L12 22.75 L2.25 17 V7 Z" fill="#5FA04E"/>
      <text x="12" y="16" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="white">N</text>
    </symbol>

    <!-- Git: orange rotated square with branch -->
    <symbol id="i-git" viewBox="0 0 24 24">
      <path d="M23.546 10.93L13.067.452c-.604-.603-1.582-.603-2.188 0L8.708 2.627l2.76 2.76c.645-.215 1.379-.07 1.889.441.516.515.658 1.258.438 1.9l2.658 2.66c.645-.223 1.387-.078 1.9.435.721.72.721 1.884 0 2.604-.719.719-1.881.719-2.6 0-.539-.541-.674-1.337-.404-1.996L12.86 8.955v6.525c.176.086.342.203.488.348.713.721.713 1.883 0 2.6-.719.721-1.889.721-2.609 0-.719-.719-.719-1.879 0-2.598.182-.18.387-.316.605-.406V8.835c-.217-.091-.424-.222-.6-.401-.545-.545-.676-1.342-.396-2.009L7.636 3.7.45 10.881c-.6.605-.6 1.584 0 2.189l10.48 10.477c.604.604 1.582.604 2.186 0l10.43-10.43c.605-.603.605-1.582 0-2.187" fill="#F05032"/>
    </symbol>

    <!-- GitHub: black octocat -->
    <symbol id="i-github" viewBox="0 0 24 24">
      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" fill="#181717"/>
    </symbol>

    <!-- npm: red square with white "npm" wordmark -->
    <symbol id="i-npm" viewBox="0 0 24 24">
      <path fill-rule="evenodd" clip-rule="evenodd" d="M1.763 0C.786 0 0 .786 0 1.763v20.474C0 23.214.786 24 1.763 24h20.474c.977 0 1.763-.786 1.763-1.763V1.763C23.978.786 23.192 0 22.215 0zM5.13 5.323l13.837.019-.009 13.836h-3.464l.01-10.382h-3.456L12.04 19.17H5.113z" fill="#CB3837"/>
    </symbol>

    <!-- Supabase: green lightning bolt -->
    <symbol id="i-supabase" viewBox="0 0 24 24">
      <path d="M21.362 9.354H12V.396a.396.396 0 00-.716-.233L2.203 12.424l-.401.562a1.04 1.04 0 00.836 1.659H12v8.959a.396.396 0 00.716.233l9.081-12.261.401-.562a1.04 1.04 0 00-.836-1.66z" fill="#3ECF8E"/>
    </symbol>

    <!-- Terminal: charcoal tile with green >_ prompt -->
    <symbol id="i-terminal" viewBox="0 0 24 24">
      <rect width="24" height="24" rx="4" fill="#1E1E1E"/>
      <g fill="none" stroke="#4ADE80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5.5,8 9.5,12 5.5,16"/>
        <line x1="11.5" y1="17" x2="18.5" y2="17"/>
      </g>
    </symbol>

    <!-- Vercel: black triangle -->
    <symbol id="i-vercel" viewBox="0 0 24 24">
      <path d="M24 22.525H0l12-21.05 12 21.05z" fill="#000000"/>
    </symbol>

    <!-- Power Automate: Microsoft blue tile with flow arrows -->
    <symbol id="i-powerautomate" viewBox="0 0 24 24">
      <rect width="24" height="24" rx="4" fill="#0066FF"/>
      <g fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 10 A6 6 0 0 1 18 10"/>
        <polyline points="15.5,7.5 18,10 20.2,7.8"/>
        <path d="M18 14 A6 6 0 0 1 6 14"/>
        <polyline points="8.5,16.5 6,14 3.8,16.2"/>
      </g>
    </symbol>

    <!-- OneDrive: blue cloud silhouette -->
    <symbol id="i-onedrive" viewBox="0 0 24 24">
      <path d="M14 6.5 A5.2 5.2 0 0 0 9.1 10 A4 4 0 0 0 3.5 13.5 A4 4 0 0 0 7.5 17.5 H19 A3.2 3.2 0 0 0 22.2 14.3 A3.6 3.6 0 0 0 18.6 10.7 A5.2 5.2 0 0 0 14 6.5 Z" fill="#0364B8"/>
    </symbol>
  </defs>

  <!-- White background -->
  <rect x="0" y="0" width="1800" height="1380" fill="#ffffff"/>

  <!-- Title -->
  <text x="900" y="54" text-anchor="middle" class="fig-title">Replicating the Platform</text>
  <text x="900" y="88" text-anchor="middle" class="fig-subtitle">End-to-end steps — no prior development experience required.</text>

  <!-- Column headers -->
  <text x="120" y="138" class="col-hdr">STEP</text>
  <text x="240" y="138" class="col-hdr">ACTION AND DETAIL</text>
  <text x="1450" y="138" class="col-hdr">TOOLS</text>

  <!-- Outer frame -->
  <rect x="60" y="152" width="1680" height="1170" rx="8" class="outer"/>

  <!-- =========================================================== -->
  <!-- PHASE 1: Workstation (y=152..302) -->
  <!-- =========================================================== -->
  <rect x="60" y="152" width="1680" height="40" class="phase-band"/>
  <text x="80" y="179" class="phase-label">1. SET UP YOUR WORKSTATION</text>

  <!-- Row 1 -->
  <rect x="60" y="192" width="1680" height="110" class="row-white"/>
  <circle cx="120" cy="247" r="26" class="step-circle"/>
  <text x="120" y="256" text-anchor="middle" class="step-num">1</text>
  <text x="200" y="228" class="row-title">Install the local toolchain</text>
  <text x="200" y="258" class="row-body">VS Code, Node.js (≥ 20), and Git. Add the Claude Code extension — it lets non-developers</text>
  <text x="200" y="282" class="row-body">edit the repo in plain English, which made the app buildable by our faculty team.</text>
  <use href="#i-vscode" x="1435" y="194" width="22" height="22"/>
  <text x="1465" y="211" class="tool-name">VS Code</text>
  <use href="#i-claude" x="1435" y="222" width="22" height="22"/>
  <text x="1465" y="239" class="tool-name">Claude Code</text>
  <use href="#i-node" x="1435" y="250" width="22" height="22"/>
  <text x="1465" y="267" class="tool-name">Node.js</text>
  <use href="#i-git" x="1435" y="278" width="22" height="22"/>
  <text x="1465" y="295" class="tool-name">Git</text>

  <!-- =========================================================== -->
  <!-- PHASE 2: Fork and backend (y=302..572) -->
  <!-- =========================================================== -->
  <rect x="60" y="302" width="1680" height="40" class="phase-band"/>
  <text x="80" y="329" class="phase-label">2. FORK THE CODE AND STAND UP THE BACKEND</text>

  <!-- Row 2 -->
  <rect x="60" y="342" width="1680" height="110" class="row-alt"/>
  <circle cx="120" cy="397" r="26" class="step-circle"/>
  <text x="120" y="406" text-anchor="middle" class="step-num">2</text>
  <text x="200" y="378" class="row-title">Fork this repository and install dependencies</text>
  <text x="200" y="408" class="row-body">Click <tspan font-weight="700">Fork</tspan> on GitHub. Clone your fork locally and install packages:</text>
  <text x="200" y="434" class="row-mono">git clone https://github.com/&lt;your-org&gt;/&lt;your-fork&gt;.git  &#160;&#160;cd &lt;your-fork&gt;  &#160;&#160;npm install</text>
  <use href="#i-github" x="1435" y="372" width="22" height="22"/>
  <text x="1465" y="389" class="tool-name">GitHub</text>
  <use href="#i-npm" x="1435" y="400" width="22" height="22"/>
  <text x="1465" y="417" class="tool-name">npm</text>

  <line x1="60" y1="452" x2="1740" y2="452" class="divider"/>

  <!-- Row 3 -->
  <rect x="60" y="452" width="1680" height="120" class="row-white"/>
  <circle cx="120" cy="512" r="26" class="step-circle"/>
  <text x="120" y="521" text-anchor="middle" class="step-num">3</text>
  <text x="200" y="490" class="row-title">Create a Supabase project and apply the schema</text>
  <text x="200" y="520" class="row-body">Create a free project at supabase.com. In the SQL editor, run each migration in</text>
  <text x="200" y="544" class="row-mono">supabase/migrations/</text><text x="380" y="544" class="row-body">in order. Copy the project URL plus the <tspan class="row-mono">anon</tspan> and <tspan class="row-mono">service_role</tspan> keys for step 5.</text>
  <use href="#i-supabase" x="1435" y="501" width="22" height="22"/>
  <text x="1465" y="518" class="tool-name">Supabase</text>

  <!-- =========================================================== -->
  <!-- PHASE 3: Customize (y=572..842) -->
  <!-- =========================================================== -->
  <rect x="60" y="572" width="1680" height="40" class="phase-band"/>
  <text x="80" y="599" class="phase-label">3. CUSTOMIZE FOR YOUR INSTITUTION</text>

  <!-- Row 4 -->
  <rect x="60" y="612" width="1680" height="110" class="row-alt"/>
  <circle cx="120" cy="667" r="26" class="step-circle"/>
  <text x="120" y="676" text-anchor="middle" class="step-num">4</text>
  <text x="200" y="648" class="row-title">Set allowlists, branding, and admin emails</text>
  <text x="200" y="678" class="row-body">Update <tspan class="row-mono">ALLOWED_DOMAINS</tspan> (accepted email domains), institution name, and footer strings in</text>
  <text x="200" y="702" class="row-body">the login and homepage files. Seed the <tspan class="row-mono">admins</tspan> table in Supabase with your admin emails.</text>
  <use href="#i-vscode" x="1435" y="642" width="22" height="22"/>
  <text x="1465" y="659" class="tool-name">VS Code</text>
  <use href="#i-claude" x="1435" y="670" width="22" height="22"/>
  <text x="1465" y="687" class="tool-name">Claude Code</text>

  <line x1="60" y1="722" x2="1740" y2="722" class="divider"/>

  <!-- Row 5 -->
  <rect x="60" y="722" width="1680" height="120" class="row-white"/>
  <circle cx="120" cy="782" r="26" class="step-circle"/>
  <text x="120" y="791" text-anchor="middle" class="step-num">5</text>
  <text x="200" y="760" class="row-title">Configure environment variables</text>
  <text x="200" y="790" class="row-body">Copy <tspan class="row-mono">.env.local.example</tspan> to <tspan class="row-mono">.env.local</tspan> and fill in the four required values — the three Supabase</text>
  <text x="200" y="814" class="row-body">keys plus <tspan class="row-mono">SITE_PASSWORD</tspan>, a shared password that institutional users enter alongside their email.</text>
  <use href="#i-vscode" x="1435" y="771" width="22" height="22"/>
  <text x="1465" y="788" class="tool-name">VS Code</text>

  <!-- =========================================================== -->
  <!-- PHASE 4: Deploy (y=842..1112) -->
  <!-- =========================================================== -->
  <rect x="60" y="842" width="1680" height="40" class="phase-band"/>
  <text x="80" y="869" class="phase-label">4. DEPLOY</text>

  <!-- Row 6 -->
  <rect x="60" y="882" width="1680" height="110" class="row-alt"/>
  <circle cx="120" cy="937" r="26" class="step-circle"/>
  <text x="120" y="946" text-anchor="middle" class="step-num">6</text>
  <text x="200" y="918" class="row-title">Verify locally</text>
  <text x="200" y="948" class="row-mono">npm run dev</text><text x="305" y="948" class="row-body">then open http://localhost:3000. Sign in with any allowlisted email + the</text>
  <text x="200" y="972" class="row-body">shared password. Confirm the calendar, wish list, and admin controls behave as expected.</text>
  <use href="#i-terminal" x="1435" y="926" width="22" height="22"/>
  <text x="1465" y="943" class="tool-name">Terminal</text>

  <line x1="60" y1="992" x2="1740" y2="992" class="divider"/>

  <!-- Row 7 -->
  <rect x="60" y="992" width="1680" height="120" class="row-white"/>
  <circle cx="120" cy="1052" r="26" class="step-circle"/>
  <text x="120" y="1061" text-anchor="middle" class="step-num">7</text>
  <text x="200" y="1030" class="row-title">Push to GitHub and deploy on Vercel</text>
  <text x="200" y="1060" class="row-body">Push your fork. In Vercel, <tspan font-weight="700">Add New Project</tspan> → import the repo, paste the same environment</text>
  <text x="200" y="1084" class="row-body">variables, and click <tspan font-weight="700">Deploy</tspan>. You receive a public <tspan class="row-mono">*.vercel.app</tspan> URL in about a minute.</text>
  <use href="#i-github" x="1435" y="1027" width="22" height="22"/>
  <text x="1465" y="1044" class="tool-name">GitHub</text>
  <use href="#i-vercel" x="1435" y="1055" width="22" height="22"/>
  <text x="1465" y="1072" class="tool-name">Vercel</text>

  <!-- =========================================================== -->
  <!-- PHASE 5: Optional (y=1112..1322) -->
  <!-- =========================================================== -->
  <rect x="60" y="1112" width="1680" height="40" class="phase-band"/>
  <text x="80" y="1139" class="phase-label">5. OPTIONAL — HIPAA-GRADE TEACHING-CASE SYNC</text>

  <!-- Row 8 -->
  <rect x="60" y="1152" width="1680" height="170" class="row-alt"/>
  <circle cx="120" cy="1237" r="26" class="step-circle"/>
  <text x="120" y="1246" text-anchor="middle" class="step-num">8</text>
  <text x="200" y="1188" class="row-title">Bridge teaching cases to institutional OneDrive</text>
  <text x="200" y="1218" class="row-body">If your teaching-case repository needs to record identifying details, keep them out of Supabase by</text>
  <text x="200" y="1242" class="row-body">writing only to OneDrive (covered under your institution's Business Associate Agreement). In Power</text>
  <text x="200" y="1266" class="row-body">Automate, create an HTTP-trigger flow that appends a row to a Teaching Cases workbook, then paste</text>
  <text x="200" y="1290" class="row-body">the signed URL into <tspan class="row-mono">POWER_AUTOMATE_WEBHOOK_URL</tspan> (in <tspan class="row-mono">.env.local</tspan> and in Vercel).</text>
  <use href="#i-powerautomate" x="1435" y="1212" width="22" height="22"/>
  <text x="1465" y="1229" class="tool-name">Power Automate</text>
  <use href="#i-onedrive" x="1435" y="1240" width="22" height="22"/>
  <text x="1465" y="1257" class="tool-name">OneDrive</text>

  <!-- Footer caption -->
  <text x="900" y="1358" text-anchor="middle" class="fig-subtitle">Supabase, Vercel, and GitHub each offer free tiers sufficient for a residency-scale program.</text>
</svg>
