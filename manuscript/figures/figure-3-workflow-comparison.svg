<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Helvetica, Arial, sans-serif" shape-rendering="geometricPrecision">
  <style>
    .title { font-size: 22px; font-weight: 700; fill: #111; }
    .col-header { font-size: 17px; font-weight: 700; fill: #111; }
    .col-header-sub { font-size: 12px; font-weight: 400; fill: #555; font-style: italic; }
    .stage-label { font-size: 14px; font-weight: 700; fill: #222; }
    .stage-text { font-size: 13px; font-weight: 400; fill: #333; }
    .stage-text-muted { font-size: 13px; font-weight: 400; fill: #777; font-style: italic; }
    .divider { stroke: #d4d4d4; stroke-width: 1; }
    .col-divider { stroke: #bbb; stroke-width: 1; }
    .header-underline-left { stroke: #9a9a9a; stroke-width: 2; }
    .header-underline-right { stroke: #1f4e79; stroke-width: 2; }
    .arrow { stroke: #1f4e79; stroke-width: 1.5; fill: none; }
    .cap-left { fill: #f3f0e9; stroke: #c9c2ae; stroke-width: 1; }
    .cap-right { fill: #eaf1f8; stroke: #a9c2dc; stroke-width: 1; }
  </style>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" class="title">Workflow comparison: a single journal-club session</text>

  <!-- Column headers -->
  <text x="450" y="90" text-anchor="middle" class="col-header">Whiteboard-era</text>
  <text x="450" y="108" text-anchor="middle" class="col-header-sub">transient, faculty-maintained</text>
  <line x1="270" y1="118" x2="630" y2="118" class="header-underline-left"/>

  <text x="900" y="90" text-anchor="middle" class="col-header">Platform-era</text>
  <text x="900" y="108" text-anchor="middle" class="col-header-sub">durable, resident-interactive</text>
  <line x1="720" y1="118" x2="1080" y2="118" class="header-underline-right"/>

  <!-- Vertical divider between columns -->
  <line x1="675" y1="135" x2="675" y2="730" class="col-divider"/>

  <!-- ===== Stage 1: Topic selection ===== -->
  <text x="30" y="168" class="stage-label">1. Topic selection</text>
  <line x1="20" y1="178" x2="1180" y2="178" class="divider"/>

  <!-- Whiteboard cell -->
  <rect x="240" y="195" width="420" height="70" rx="6" class="cap-left"/>
  <text x="260" y="220" class="stage-text">Faculty writes topic on whiteboard;</text>
  <text x="260" y="240" class="stage-text">resident suggestions are spoken in passing</text>
  <text x="260" y="258" class="stage-text-muted">and often forgotten between sessions.</text>

  <!-- Platform cell -->
  <rect x="690" y="195" width="420" height="70" rx="6" class="cap-right"/>
  <text x="710" y="220" class="stage-text">Residents submit topics to the wish list</text>
  <text x="710" y="240" class="stage-text">and upvote peers' submissions; list persists</text>
  <text x="710" y="258" class="stage-text-muted">year over year, admin schedules from it.</text>

  <!-- ===== Stage 2: Paper distribution ===== -->
  <text x="30" y="308" class="stage-label">2. Paper distribution</text>
  <line x1="20" y1="318" x2="1180" y2="318" class="divider"/>

  <rect x="240" y="335" width="420" height="70" rx="6" class="cap-left"/>
  <text x="260" y="360" class="stage-text">PDFs circulate by email or handout the</text>
  <text x="260" y="380" class="stage-text">week of the session; no canonical copy;</text>
  <text x="260" y="398" class="stage-text-muted">residents on leave miss the thread.</text>

  <rect x="690" y="335" width="420" height="70" rx="6" class="cap-right"/>
  <text x="710" y="360" class="stage-text">PDFs + citation + PubMed/DOI link attached</text>
  <text x="710" y="380" class="stage-text">to the calendar entry weeks in advance;</text>
  <text x="710" y="398" class="stage-text-muted">any authenticated resident can download.</text>

  <!-- ===== Stage 3: Session conduct ===== -->
  <text x="30" y="448" class="stage-label">3. Session conduct</text>
  <line x1="20" y1="458" x2="1180" y2="458" class="divider"/>

  <rect x="240" y="475" width="420" height="70" rx="6" class="cap-left"/>
  <text x="260" y="500" class="stage-text">Meeting link shared ad hoc; research</text>
  <text x="260" y="520" class="stage-text">ideas raised in discussion noted on paper</text>
  <text x="260" y="538" class="stage-text-muted">or lost at the end of the hour.</text>

  <rect x="690" y="475" width="420" height="70" rx="6" class="cap-right"/>
  <text x="710" y="500" class="stage-text">Persistent Webex link attached per session</text>
  <text x="710" y="520" class="stage-text">type; residents log research ideas live</text>
  <text x="710" y="538" class="stage-text-muted">into a tagged, submitter-attributed log.</text>

  <!-- ===== Stage 4: Long-term archival ===== -->
  <text x="30" y="588" class="stage-label">4. Long-term archival</text>
  <line x1="20" y1="598" x2="1180" y2="598" class="divider"/>

  <rect x="240" y="615" width="420" height="70" rx="6" class="cap-left"/>
  <text x="260" y="640" class="stage-text">Topic erased at end of the week; no</text>
  <text x="260" y="660" class="stage-text">institutional memory of what was taught,</text>
  <text x="260" y="678" class="stage-text-muted">by whom, or when, across academic years.</text>

  <rect x="690" y="615" width="420" height="70" rx="6" class="cap-right"/>
  <text x="710" y="640" class="stage-text">Session auto-rolls from the calendar into</text>
  <text x="710" y="660" class="stage-text">a searchable archive as the date passes;</text>
  <text x="710" y="678" class="stage-text-muted">every paper taught is findable indefinitely.</text>

  <!-- ===== Stage 5: Teaching cases ===== -->
  <text x="30" y="728" class="stage-label">5. Teaching cases</text>
  <line x1="20" y1="738" x2="1180" y2="738" class="divider"/>

  <rect x="240" y="755" width="420" height="18" rx="3" class="cap-left" style="fill:none;stroke:none"/>
  <text x="260" y="768" class="stage-text-muted">Interesting on-call fractures mentioned but not captured.</text>

  <rect x="690" y="755" width="420" height="18" rx="3" class="cap-right" style="fill:none;stroke:none"/>
  <text x="710" y="768" class="stage-text-muted">Residents log fractures by AO/OTA type (PHI kept in OneDrive under BAA).</text>

</svg>
